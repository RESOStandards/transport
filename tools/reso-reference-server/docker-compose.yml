services:
  # ---------------------------------------------------------------------------
  # PostgreSQL backend (default)
  # Usage: docker compose up -d
  # ---------------------------------------------------------------------------
  server:
    build:
      context: ..
      dockerfile: reso-reference-server/server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_BACKEND: postgres
      DATABASE_URL: postgresql://reso:reso@db:5432/reso_reference
      METADATA_PATH: ./server-metadata.json
      BASE_URL: http://localhost:8080
      ENUM_MODE: string
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reso
      POSTGRES_PASSWORD: reso
      POSTGRES_DB: reso_reference
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reso -d reso_reference"]
      interval: 5s
      timeout: 5s
      retries: 5

  ui:
    build:
      context: ..
      dockerfile: reso-reference-server/ui/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - server
    restart: unless-stopped

  # Optional: seed PostgreSQL with realistic test data
  # Usage: docker compose --profile seed up
  seed:
    build:
      context: ..
      dockerfile: reso-reference-server/server/Dockerfile
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for server at http://server:8080..."
        until wget -qO- http://server:8080/health > /dev/null 2>&1; do sleep 2; done
        echo "Server ready. Seeding data with dependency resolution..."

        wget -qO- --post-data='{"resource":"Property","count":50,"resolveDependencies":true,"relatedRecords":{"Media":5,"OpenHouse":2,"Showing":2,"PropertyRooms":3,"PropertyGreenVerification":1,"PropertyPowerProduction":1,"PropertyUnitTypes":2}}' \
          --header='Content-Type: application/json' --header='Authorization: Bearer admin-token' \
          http://server:8080/admin/data-generator || true

        echo "Seed complete."
    depends_on:
      server:
        condition: service_healthy
    profiles:
      - seed

  # ---------------------------------------------------------------------------
  # MongoDB backend (alternative)
  # Usage: docker compose --profile mongodb up -d
  # Seed:  docker compose --profile mongodb --profile seed-mongo up
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - mongodb

  server-mongo:
    build:
      context: ..
      dockerfile: reso-reference-server/server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_BACKEND: mongodb
      MONGODB_URL: mongodb://mongodb:27017/reso_reference
      METADATA_PATH: ./server-metadata.json
      BASE_URL: http://localhost:8080
      ENUM_MODE: string
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    profiles:
      - mongodb

  ui-mongo:
    build:
      context: ..
      dockerfile: reso-reference-server/ui/Dockerfile
    ports:
      - "5173:80"
    environment:
      API_UPSTREAM: server-mongo:8080
    depends_on:
      - server-mongo
    restart: unless-stopped
    profiles:
      - mongodb

  seed-mongo:
    build:
      context: ..
      dockerfile: reso-reference-server/server/Dockerfile
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for server at http://server-mongo:8080..."
        until wget -qO- http://server-mongo:8080/health > /dev/null 2>&1; do sleep 2; done
        echo "Server ready. Seeding data with dependency resolution..."

        wget -qO- --post-data='{"resource":"Property","count":50,"resolveDependencies":true,"relatedRecords":{"Media":5,"OpenHouse":2,"Showing":2,"PropertyRooms":3,"PropertyGreenVerification":1,"PropertyPowerProduction":1,"PropertyUnitTypes":2}}' \
          --header='Content-Type: application/json' --header='Authorization: Bearer admin-token' \
          http://server-mongo:8080/admin/data-generator || true

        echo "Seed complete."
    depends_on:
      server-mongo:
        condition: service_healthy
    profiles:
      - seed-mongo

  # ---------------------------------------------------------------------------
  # SQLite backend (lightweight, no external database)
  # Usage: docker compose --profile sqlite up -d server-sqlite ui-sqlite
  # Seed:  docker compose --profile sqlite --profile seed-sqlite up
  # ---------------------------------------------------------------------------
  server-sqlite:
    build:
      context: ..
      dockerfile: reso-reference-server/server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_BACKEND: sqlite
      SQLITE_DB_PATH: /data/reso_reference.db
      METADATA_PATH: ./server-metadata.json
      BASE_URL: http://localhost:8080
      ENUM_MODE: string
    volumes:
      - sqlitedata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    profiles:
      - sqlite

  ui-sqlite:
    build:
      context: ..
      dockerfile: reso-reference-server/ui/Dockerfile
    ports:
      - "5173:80"
    environment:
      API_UPSTREAM: server-sqlite:8080
    depends_on:
      - server-sqlite
    restart: unless-stopped
    profiles:
      - sqlite

  seed-sqlite:
    build:
      context: ..
      dockerfile: reso-reference-server/server/Dockerfile
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for server at http://server-sqlite:8080..."
        until wget -qO- http://server-sqlite:8080/health > /dev/null 2>&1; do sleep 2; done
        echo "Server ready. Seeding data with dependency resolution..."

        wget -qO- --post-data='{"resource":"Property","count":50,"resolveDependencies":true,"relatedRecords":{"Media":5,"OpenHouse":2,"Showing":2,"PropertyRooms":3,"PropertyGreenVerification":1,"PropertyPowerProduction":1,"PropertyUnitTypes":2}}' \
          --header='Content-Type: application/json' --header='Authorization: Bearer admin-token' \
          http://server-sqlite:8080/admin/data-generator || true

        echo "Seed complete."
    depends_on:
      server-sqlite:
        condition: service_healthy
    profiles:
      - seed-sqlite

  # ---------------------------------------------------------------------------
  # Compliance: Data Dictionary 2.0 (PostgreSQL)
  # Usage: docker compose --profile compliance-dd up --build --exit-code-from compliance-dd
  # ---------------------------------------------------------------------------
  compliance-dd:
    build:
      context: compliance
      dockerfile: Dockerfile.dd
    entrypoint: ["/bin/sh", "/config/entrypoint-dd.sh"]
    environment:
      SERVER_URL: http://server:8080
    volumes:
      - ./compliance:/config:ro
      - compliance-dd-results:/reso-certification-utils/results
    depends_on:
      server:
        condition: service_healthy
    profiles:
      - compliance
      - compliance-dd

  # ---------------------------------------------------------------------------
  # Compliance: Web API Core 2.0.0 (PostgreSQL)
  # Usage: docker compose --profile compliance-core up --build --exit-code-from compliance-core
  # ---------------------------------------------------------------------------
  compliance-core:
    build:
      context: compliance
      dockerfile: Dockerfile.core
    entrypoint: ["/bin/sh", "/config/entrypoint-core.sh"]
    environment:
      SERVER_URL: http://server:8080
      AUTH_TOKEN: admin-token
      ENUM_MODE: ${ENUM_MODE:-string}
    volumes:
      - ./compliance:/config:ro
      - compliance-core-results:/commander/build/certification
    depends_on:
      server:
        condition: service_healthy
    profiles:
      - compliance
      - compliance-core

  # ---------------------------------------------------------------------------
  # Compliance: Data Dictionary 2.0 (MongoDB)
  # Usage: docker compose --profile compliance-dd-mongo up --build --exit-code-from compliance-dd-mongo
  # ---------------------------------------------------------------------------
  compliance-dd-mongo:
    build:
      context: compliance
      dockerfile: Dockerfile.dd
    entrypoint: ["/bin/sh", "/config/entrypoint-dd.sh"]
    environment:
      SERVER_URL: http://server-mongo:8080
    volumes:
      - ./compliance:/config:ro
      - compliance-dd-mongo-results:/reso-certification-utils/results
    depends_on:
      server-mongo:
        condition: service_healthy
    profiles:
      - compliance-mongo
      - compliance-dd-mongo

  # ---------------------------------------------------------------------------
  # Compliance: Web API Core 2.0.0 (MongoDB)
  # Usage: docker compose --profile compliance-core-mongo up --build --exit-code-from compliance-core-mongo
  # ---------------------------------------------------------------------------
  compliance-core-mongo:
    build:
      context: compliance
      dockerfile: Dockerfile.core
    entrypoint: ["/bin/sh", "/config/entrypoint-core.sh"]
    environment:
      SERVER_URL: http://server-mongo:8080
      AUTH_TOKEN: admin-token
      ENUM_MODE: ${ENUM_MODE:-string}
    volumes:
      - ./compliance:/config:ro
      - compliance-core-mongo-results:/commander/build/certification
    depends_on:
      server-mongo:
        condition: service_healthy
    profiles:
      - compliance-mongo
      - compliance-core-mongo

  # ---------------------------------------------------------------------------
  # Compliance: Data Dictionary 2.0 (SQLite)
  # Usage: docker compose --profile sqlite --profile compliance-dd-sqlite up --build --exit-code-from compliance-dd-sqlite
  # ---------------------------------------------------------------------------
  compliance-dd-sqlite:
    build:
      context: compliance
      dockerfile: Dockerfile.dd
    entrypoint: ["/bin/sh", "/config/entrypoint-dd.sh"]
    environment:
      SERVER_URL: http://server-sqlite:8080
    volumes:
      - ./compliance:/config:ro
      - compliance-dd-sqlite-results:/reso-certification-utils/results
    depends_on:
      server-sqlite:
        condition: service_healthy
    profiles:
      - compliance-sqlite
      - compliance-dd-sqlite

  # ---------------------------------------------------------------------------
  # Compliance: Web API Core 2.0.0 (SQLite)
  # Usage: docker compose --profile sqlite --profile compliance-core-sqlite up --build --exit-code-from compliance-core-sqlite
  # ---------------------------------------------------------------------------
  compliance-core-sqlite:
    build:
      context: compliance
      dockerfile: Dockerfile.core
    entrypoint: ["/bin/sh", "/config/entrypoint-core.sh"]
    environment:
      SERVER_URL: http://server-sqlite:8080
      AUTH_TOKEN: admin-token
      ENUM_MODE: ${ENUM_MODE:-string}
    volumes:
      - ./compliance:/config:ro
      - compliance-core-sqlite-results:/commander/build/certification
    depends_on:
      server-sqlite:
        condition: service_healthy
    profiles:
      - compliance-sqlite
      - compliance-core-sqlite

  # ---------------------------------------------------------------------------
  # Compliance: Add/Edit RCP-010 (ephemeral PostgreSQL)
  # Usage: docker compose --profile compliance-addedit up --build --exit-code-from compliance-addedit
  # ---------------------------------------------------------------------------
  db-addedit:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reso
      POSTGRES_PASSWORD: reso
      POSTGRES_DB: reso_addedit
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reso -d reso_addedit"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - compliance-addedit

  server-addedit:
    build:
      context: ..
      dockerfile: reso-reference-server/server/Dockerfile
    environment:
      PORT: 8080
      DB_BACKEND: postgres
      DATABASE_URL: postgresql://reso:reso@db-addedit:5432/reso_addedit
      METADATA_PATH: ./server-metadata.json
      BASE_URL: http://server-addedit:8080
      ENUM_MODE: string
    depends_on:
      db-addedit:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    profiles:
      - compliance-addedit

  compliance-addedit:
    build:
      context: ..
      dockerfile: certification/Dockerfile
    entrypoint: ["/bin/sh", "/config/entrypoint-addedit.sh"]
    environment:
      SERVER_URL: http://server-addedit:8080
      AUTH_TOKEN: admin-token
      RESOURCE: Property
    volumes:
      - ./compliance:/config:ro
    depends_on:
      server-addedit:
        condition: service_healthy
    profiles:
      - compliance-addedit

volumes:
  pgdata:
  mongodata:
  sqlitedata:
  compliance-dd-results:
  compliance-core-results:
  compliance-dd-mongo-results:
  compliance-core-mongo-results:
  compliance-dd-sqlite-results:
  compliance-core-sqlite-results:
