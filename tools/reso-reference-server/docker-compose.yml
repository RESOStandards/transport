services:
  server:
    build:
      context: ..
      dockerfile: reso-reference-server/server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://reso:reso@db:5432/reso_reference
      METADATA_PATH: ./server-metadata.json
      BASE_URL: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reso
      POSTGRES_PASSWORD: reso
      POSTGRES_DB: reso_reference
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reso -d reso_reference"]
      interval: 5s
      timeout: 5s
      retries: 5

  ui:
    build:
      context: ..
      dockerfile: reso-reference-server/ui/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - server
    restart: unless-stopped

  # Optional: seed the database with realistic test data
  # Usage: docker-compose --profile seed up
  seed:
    build:
      context: ..
      dockerfile: reso-reference-server/server/Dockerfile
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for server at http://server:8080..."
        until wget -qO- http://server:8080/health > /dev/null 2>&1; do sleep 2; done
        echo "Server ready. Seeding data..."

        wget -qO- --post-data='{"resource":"Property","count":50,"relatedRecords":{"Media":5,"OpenHouse":2,"Showing":2}}' \
          --header='Content-Type: application/json' --header='Authorization: Bearer admin-token' \
          http://server:8080/admin/data-generator || true

        wget -qO- --post-data='{"resource":"Member","count":20}' \
          --header='Content-Type: application/json' --header='Authorization: Bearer admin-token' \
          http://server:8080/admin/data-generator || true

        wget -qO- --post-data='{"resource":"Office","count":10}' \
          --header='Content-Type: application/json' --header='Authorization: Bearer admin-token' \
          http://server:8080/admin/data-generator || true

        echo "Seed complete."
    depends_on:
      server:
        condition: service_healthy
    profiles:
      - seed

volumes:
  pgdata:
