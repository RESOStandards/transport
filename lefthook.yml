pre-commit:
  commands:
    lint-fix:
      glob: "tools/**/*.{ts,tsx}"
      run: npx biome check --fix --staged {staged_files}
      stage_fixed: true

    typecheck-validation:
      root: "tools/validation/"
      run: npx tsc --noEmit
      priority: 1

    typecheck-filter-parser:
      root: "tools/odata-filter-parser/"
      run: npx tsc --noEmit
      priority: 1

    typecheck-client:
      root: "tools/odata-client/"
      run: npx tsc --noEmit
      priority: 2

    typecheck-data-generator:
      root: "tools/data-generator/"
      run: npx tsc --noEmit
      priority: 2

    typecheck-server:
      root: "tools/reso-reference-server/server/"
      run: npx tsc --noEmit
      priority: 2

    typecheck-test-runner:
      root: "tools/certification/test-runner/"
      run: npx tsc --noEmit
      priority: 2

    typecheck-certification:
      root: "tools/certification/add-edit/"
      run: npx tsc --noEmit
      priority: 3

    typecheck-ui:
      root: "tools/reso-reference-server/ui/"
      run: npx tsc --noEmit
      priority: 2

    test-validation:
      root: "tools/validation/"
      run: npx vitest run
      priority: 3

    test-filter-parser:
      root: "tools/odata-filter-parser/"
      run: npx vitest run
      priority: 3

    test-client:
      root: "tools/odata-client/"
      run: npx vitest run
      priority: 4

    test-data-generator:
      root: "tools/data-generator/"
      run: npx vitest run
      priority: 4

    test-server:
      root: "tools/reso-reference-server/server/"
      run: npx vitest run
      priority: 4

    test-certification:
      root: "tools/certification/add-edit/"
      run: npx vitest run
      priority: 5
